packages:
  # Turbo only accepts * globs not ** globs
  - 'apps/hsp/*'
  - 'apps/explore/*'
  - 'apps/learn/threejs/*'
  - 'apps/*'
  - 'packages/configs/*'
  - 'packages/*'
  - 'packages/hsp/*'
catalogs:
  # Pin the versions of the packages in the workspace
  base:
    '@types/node': 22.13.17
  prisma:
    prisma: 6.13.0
    '@prisma/client': 6.13.0
  gui:
    react: 19.2.3
    react-dom: 19.2.3
    react-icons: 5.5.0
    'eslint-plugin-react': '^7.37.5'
    'eslint-plugin-react-hooks': 7.0.1
    '@types/react': 19.2.3
    '@types/react-dom': 19.2.3
    next: 16.1.6
    '@next/eslint-plugin-next': 16.1.6
    'sharp': '^0.34.5'
    next-themes: 0.4.6
    radix-ui: 1.4.3
    tailwindcss: 4.1.18
  three:
    '@react-three/cannon': '6.6.0'
    '@react-three/drei': '10.7.7'
    '@react-three/fiber': '9.5.0'
    r3f-perf: 7.2.3 # TODO: Outdated, unused, but keeping for now to see if there are any alternatives
    'three': '^0.183.2'
    '@types/three': '^0.183.1'
    lil-gui: '0.20.0'
  markdown:
    # Content Collections (to manage markdown content)
    '@content-collections/core': '^0.11.1'
    '@content-collections/mdx': '^0.2.2' ## Markdown support
    '@content-collections/next': '^0.2.11' ## Next.js integration
    # Markdown processing
    'remark-gfm': '^4.0.1' # GitHub Flavored Markdown (tables, task lists, etc)
    'rehype-autolink-headings': '^7.1.0' # Adds links to headings
    'rehype-slug': '^6.0.0' # Adds slugs to headings
    'rehype-pretty-code': '^0.14.1' # Syntax highlighting
    'shiki': '^3.13.0' # Syntax highlighting engine
    'reading-time': '^1.5.0' # Estimate reading time
    # Table of content generation
    'remark': '^15.0.1'
  dev:
    'eslint': 9.32.0
    'vitest': 3.2.4
    '@vitejs/plugin-react': '5.0.0'
    'jsdom': '26.1.0'
    '@testing-library/react': '16.3.0'
    '@testing-library/dom': '10.4.1'
    '@testing-library/jest-dom': '6.6.4'
    'vite-tsconfig-paths': '5.1.4'
    'typescript': '5.9.2'
    'typescript-eslint': '8.39.0'
    '@chromatic-com/storybook': '^4.1.0'
    '@storybook/addon-a11y': '^9.1.1'
    '@storybook/addon-docs': '^9.1.1'
    '@storybook/addon-styling-webpack': '^2.0.0'
    '@storybook/addon-vitest': '^9.1.1'
    '@storybook/nextjs-vite': '^9.1.1'
    'eslint-plugin-storybook': '^9.1.1'
    'storybook': '^9.1.1'
