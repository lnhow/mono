packages:
  # Turbo only accepts * globs not ** globs
  - 'apps/hsp/*'
  - 'apps/explore/*'
  - 'apps/learn/threejs/*'
  - 'apps/*'
  - 'packages/configs/*'
  - 'packages/*'
  - 'packages/hsp/*'
catalogs:
  # Pin the versions of the packages in the workspace
  base:
    '@types/node': 24.12.0
  prisma:
    prisma: 6.19.2
    '@prisma/client': 6.19.2
  gui:
    react: 19.2.4
    react-dom: 19.2.4
    react-icons: 5.6.0
    'eslint-plugin-react': '^7.37.5'
    'eslint-plugin-react-hooks': 7.0.1
    '@types/react': 19.2.14
    '@types/react-dom': 19.2.3
    next: 16.1.6
    '@next/eslint-plugin-next': 16.1.6
    'sharp': '^0.34.5'
    next-themes: 0.4.6
    radix-ui: 1.4.3
    tailwindcss: 4.2.1
  three:
    '@react-three/cannon': '6.6.0'
    '@react-three/drei': '10.7.7'
    '@react-three/fiber': '9.5.0'
    r3f-perf: 7.2.3 # TODO: Outdated, unused, but keeping for now to see if there are any alternatives
    'three': '^0.183.2'
    '@types/three': '^0.183.1'
    lil-gui: '0.21.0'
  markdown:
    # Content Collections (to manage markdown content)
    '@content-collections/core': '^0.14.2'
    '@content-collections/mdx': '^0.2.2' ## Markdown support
    '@content-collections/next': '^0.2.11' ## Next.js integration
    # Markdown processing
    'remark-gfm': '^4.0.1' # GitHub Flavored Markdown (tables, task lists, etc)
    'rehype-autolink-headings': '^7.1.0' # Adds links to headings
    'rehype-slug': '^6.0.0' # Adds slugs to headings
    'rehype-pretty-code': '^0.14.3' # Syntax highlighting
    'shiki': '^4.0.2' # Syntax highlighting engine
    'reading-time': '^1.5.0' # Estimate reading time
    # Table of content generation
    'remark': '^15.0.1'
    '@types/mdx': '2.0.13'
  dev:
    'eslint': 9.39.4
    '@eslint/js': '^9.39.4'
    'vitest': 4.0.18
    '@vitest/browser': '4.0.18'
    '@vitest/coverage-v8': '4.0.18'
    '@vitejs/plugin-react': '5.1.4'
    'jsdom': '28.1.0'
    '@testing-library/react': '16.3.2'
    '@testing-library/dom': '10.4.1'
    '@testing-library/jest-dom': '6.9.1'
    'vite-tsconfig-paths': '6.1.1'
    'typescript': '5.9.3'
    'typescript-eslint': '8.57.0'
    '@chromatic-com/storybook': '^5.0.1'
    '@storybook/addon-a11y': '^10.2.17'
    '@storybook/addon-docs': '^10.2.17'
    '@storybook/addon-styling-webpack': '^3.0.0'
    '@storybook/addon-vitest': '^10.2.17'
    '@storybook/nextjs-vite': '^10.2.17'
    'eslint-plugin-storybook': '^10.2.17'
    'storybook': '^10.2.17'
